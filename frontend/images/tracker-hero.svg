<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Multi Tracker Dashboard Illustration</title>
  <desc id="desc">Cards and charts representing expenses, habits, tasks, and inventory tracking.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e3d52" />
      <stop offset="60%" stop-color="#0f766e" />
      <stop offset="100%" stop-color="#0a9a86" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f9c86a" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#052533" flood-opacity="0.35" />
    </filter>
  </defs>

  <rect width="960" height="540" rx="26" fill="url(#bg)" />
  <circle cx="815" cy="110" r="70" fill="#ffffff" opacity="0.08" />
  <circle cx="120" cy="440" r="100" fill="#ffffff" opacity="0.06" />

  <g filter="url(#shadow)">
    <rect x="66" y="70" width="828" height="400" rx="22" fill="#f7fbff" />
    <rect x="66" y="70" width="828" height="66" rx="22" fill="#e7f1fa" />
    <circle cx="100" cy="103" r="10" fill="#f59e0b" />
    <circle cx="132" cy="103" r="10" fill="#13a884" />
    <circle cx="164" cy="103" r="10" fill="#124e66" />
    <rect x="202" y="90" width="220" height="24" rx="12" fill="#d1e2f1" />
  </g>

  <g transform="translate(92 158)">
    <rect x="0" y="0" width="238" height="132" rx="16" fill="#ffffff" stroke="#d6e4f2" />
    <text x="20" y="30" font-family="Space Grotesk, sans-serif" font-size="20" fill="#0f3d4c" font-weight="700">Expenses</text>
    <rect x="20" y="46" width="198" height="10" rx="5" fill="#e7f1fa" />
    <rect x="20" y="72" width="38" height="34" rx="6" fill="#124e66" />
    <rect x="66" y="64" width="38" height="42" rx="6" fill="#0f766e" />
    <rect x="112" y="52" width="38" height="54" rx="6" fill="url(#accent)" />
    <rect x="158" y="80" width="38" height="26" rx="6" fill="#3ab7a6" />
  </g>

  <g transform="translate(354 158)">
    <rect x="0" y="0" width="238" height="132" rx="16" fill="#ffffff" stroke="#d6e4f2" />
    <text x="20" y="30" font-family="Space Grotesk, sans-serif" font-size="20" fill="#0f3d4c" font-weight="700">Habits</text>
    <rect x="20" y="46" width="198" height="10" rx="5" fill="#e7f1fa" />
    <rect x="20" y="70" width="198" height="14" rx="7" fill="#edf6ff" />
    <rect x="20" y="92" width="154" height="14" rx="7" fill="#daf0ea" />
    <circle cx="198" cy="99" r="7" fill="#0f766e" />
  </g>

  <g transform="translate(616 158)">
    <rect x="0" y="0" width="238" height="132" rx="16" fill="#ffffff" stroke="#d6e4f2" />
    <text x="20" y="30" font-family="Space Grotesk, sans-serif" font-size="20" fill="#0f3d4c" font-weight="700">Tasks</text>
    <rect x="20" y="46" width="198" height="10" rx="5" fill="#e7f1fa" />
    <circle cx="28" cy="74" r="8" fill="#0f766e" />
    <rect x="44" y="68" width="160" height="12" rx="6" fill="#eff6fc" />
    <circle cx="28" cy="100" r="8" fill="url(#accent)" />
    <rect x="44" y="94" width="140" height="12" rx="6" fill="#eff6fc" />
