    <rect x="20" y="76" width="120" height="34" rx="10" fill="#e2f3ef" />
    <rect x="152" y="76" width="120" height="34" rx="10" fill="#eef5fb" />
    <rect x="284" y="76" width="120" height="34" rx="10" fill="#fff4df" />
    <rect x="416" y="76" width="120" height="34" rx="10" fill="#eef5fb" />
    <rect x="548" y="76" width="192" height="34" rx="10" fill="#d9f0eb" />
